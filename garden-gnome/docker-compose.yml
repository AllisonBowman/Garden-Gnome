# Self-hosted stack: the API plus an Ollama sidecar for photo diagnosis and
# identification. This is the easiest way to run the full vision path locally.
#
#   docker compose up -d --build
#   docker compose exec ollama ollama pull moondream   # once, ~1.7 GB
#   curl http://localhost:8080/ai/status               # vision.ready should be true
#
# JWT_SECRET and FERNET_KEY are required (the app refuses to boot without
# them) — put them in .env next to this file; see .env.example.
services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////data/garden_gnome.db
      VISION_BACKEND: ollama
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - gnome_data:/data
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama

volumes:
  gnome_data:
  ollama_models:
