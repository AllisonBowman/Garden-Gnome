# fly.toml app configuration file generated for garden-gnome-api on 2026-07-07T00:01:05-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'garden-gnome-api'
primary_region = 'iad'

[build]
[env]
  DATABASE_URL = 'sqlite:////data/garden_gnome.db'

[[mounts]]
  source = 'gnome_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
